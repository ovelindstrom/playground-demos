# curl-test-pod-json.yaml
apiVersion: v1
kind: Pod
metadata:
  name: curl-test-i18n-json-pod
spec:
  containers:
  - name: curl
    image: curlimages/curl:8.18.0@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17 # A lightweight image with curl
    command: ["tail", "-f", "/dev/null"] # Keep the pod running
    env:
    - name: MY_NODE_IP # The name of the environment variable
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP # Get the node IP where the pod is running
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
  restartPolicy: Never